{{- if and .Values.statefulset.enabled .Values.lab16.waitDependency.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "app-python.fullname" . }}-lab16-dep
  labels:
    {{- include "common.labels" . | nindent 4 }}
    app.kubernetes.io/component: lab16-dependency
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
  selector:
    app.kubernetes.io/component: lab16-dependency
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "app-python.fullname" . }}-lab16-dep
  labels:
    {{- include "common.labels" . | nindent 4 }}
    app.kubernetes.io/component: lab16-dependency
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: lab16-dependency
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: lab16-dependency
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      initContainers:
        - name: startup-delay
          image: busybox:1.36
          command: ['sh', '-c', 'sleep 25']
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
{{- end }}

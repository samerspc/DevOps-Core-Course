{{- if .Values.statefulset.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "app-python.fullname" . }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "app-python.fullname" . }}-headless
  replicas: {{ .Values.replicaCount }}
  podManagementPolicy: {{ .Values.statefulset.podManagementPolicy }}
  {{- with .Values.statefulset.updateStrategy }}
  updateStrategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "common.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "common.selectorLabels" . | nindent 8 }}
      annotations:
        {{- include "app-python.podAnnotations" . | nindent 8 }}
    spec:
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ include "app-python.serviceAccountName" . }}
      {{- end }}
      {{- $lab16Wait := and .Values.lab16.initContainers.enabled .Values.lab16.initContainers.waitForDependency .Values.lab16.waitDependency.enabled }}
      {{- $lab16Dl := and .Values.lab16.initContainers.enabled .Values.lab16.initContainers.download.enabled }}
      {{- if or $lab16Wait $lab16Dl }}
      initContainers:
        {{- if $lab16Wait }}
        - name: wait-for-lab16-dep
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              url="http://{{ include "app-python.fullname" . }}-lab16-dep.{{ .Release.Namespace }}.svc.cluster.local/"
              until wget -qO- "$url" >/dev/null 2>&1; do
                echo "waiting for dependency HTTP..."
                sleep 2
              done
              echo "dependency is reachable"
        {{- end }}
        {{- if $lab16Dl }}
        - name: init-download
          image: busybox:1.36
          command:
            - sh
            - -c
            - wget -q -O "/work-dir/{{ .Values.lab16.initContainers.download.outputFile }}" "{{ .Values.lab16.initContainers.download.url }}"
          volumeMounts:
            - name: init-workdir
              mountPath: /work-dir
        {{- end }}
      {{- end }}
      containers:
        - name: {{ include "app-python.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.targetPort }}
              name: http
          env:
            {{- include "app-python.standardEnv" . | nindent 12 }}
          {{- if or .Values.secrets.enabled .Values.configMap.enabled }}
          envFrom:
            {{- if .Values.secrets.enabled }}
            - secretRef:
                name: {{ include "app-python.secretName" . }}
            {{- end }}
            {{- if .Values.configMap.enabled }}
            - configMapRef:
                name: {{ include "app-python.fullname" . }}-env
            {{- end }}
          {{- end }}
          volumeMounts:
            {{- if .Values.configMap.enabled }}
            - name: app-config
              mountPath: /config
              readOnly: true
            {{- end }}
            - name: app-data
              mountPath: /data
            {{- if .Values.lab16.initContainers.download.enabled }}
            - name: init-workdir
              mountPath: /data/init-download
              readOnly: true
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        {{- if .Values.configMap.enabled }}
        - name: app-config
          configMap:
            name: {{ include "app-python.fullname" . }}-config
        {{- end }}
        {{- if not .Values.persistence.enabled }}
        - name: app-data
          emptyDir: {}
        {{- end }}
        {{- if .Values.lab16.initContainers.download.enabled }}
        - name: init-workdir
          emptyDir: {}
        {{- end }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      affinity:
        {{- toYaml .Values.affinity | nindent 8 }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: app-data
        labels:
          {{- include "common.labels" . | nindent 10 }}
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass | quote }}
        {{- end }}
  {{- end }}
{{- end }}

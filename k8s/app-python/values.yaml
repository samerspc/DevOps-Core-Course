# RWO PVC (Lab 12) supports only one replica per volume; scale out requires RWX or disabled persistence.
replicaCount: 1

image:
  repository: yourusername/app_python
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  enabled: true
  type: NodePort
  port: 80
  targetPort: 5000
  nodePort: null

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

livenessProbe:
  httpGet:
    path: /health
    port: 5000
  initialDelaySeconds: 10
  periodSeconds: 5

readinessProbe:
  httpGet:
    path: /health
    port: 5000
  initialDelaySeconds: 5
  periodSeconds: 3

podAnnotations: {}
podLabels: {}

# Lab 12 — ConfigMaps (file + env) and optional checksum for rollout on change
environment: dev
logLevel: info

configMap:
  enabled: true

configReload:
  checksumAnnotation: true

persistence:
  enabled: true
  size: 100Mi
  storageClass: ""

serviceAccount:
  create: true
  name: ""

secrets:
  enabled: true
  stringData:
    username: changeme
    password: changeme

vault:
  role: app-python
  inject:
    enabled: false
    secretPath: secret/data/myapp/config
    template:
      enabled: false
      content: ""

nodeSelector: {}
tolerations: []
affinity: {}

rollout:
  enabled: true
  strategy: canary
  revisionHistoryLimit: 3
  canary:
    steps:
      - setWeight: 20
      - pause: {}
      - analysis:
          templates:
            - templateName: success-rate
      - setWeight: 40
      - pause:
          duration: 30s
      - setWeight: 60
      - pause:
          duration: 30s
      - setWeight: 80
      - pause:
          duration: 30s
      - setWeight: 100
  blueGreen:
    autoPromotionEnabled: false
    autoPromotionSeconds: null
    previewService:
      enabled: true
      suffix: preview

# Lab 15 — StatefulSets (exclude Rollout workload: set rollout.enabled: false).
statefulset:
  enabled: false
  podManagementPolicy: OrderedReady
  # Bonus: partitioned rolling (only ordinals ≥ partition updated first) — see values-lab15-bonus-update.yaml.
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0

analysis:
  enabled: true
  templateName: success-rate
  metrics:
    - name: webcheck
      interval: 10s
      count: 3
      failureLimit: 1
      provider:
        web:
          path: /health
          jsonPath: "{$.status}"
      successCondition: result == "ok"

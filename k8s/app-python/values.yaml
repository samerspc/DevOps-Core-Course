replicaCount: 3

image:
  repository: yourusername/app_python
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  enabled: true
  type: NodePort
  port: 80
  targetPort: 5000
  nodePort: null

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

livenessProbe:
  httpGet:
    path: /health
    port: 5000
  initialDelaySeconds: 10
  periodSeconds: 5

readinessProbe:
  httpGet:
    path: /health
    port: 5000
  initialDelaySeconds: 5
  periodSeconds: 3

podAnnotations: {}
podLabels: {}

serviceAccount:
  create: true
  name: ""

secrets:
  enabled: true
  stringData:
    username: changeme
    password: changeme

vault:
  role: app-python
  inject:
    enabled: false
    secretPath: secret/data/myapp/config
    template:
      enabled: false
      content: ""

nodeSelector: {}
tolerations: []
affinity: {}

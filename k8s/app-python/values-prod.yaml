# Single replica while persistence uses ReadWriteOnce (Lab 12); set persistence.enabled: false to scale out.
replicaCount: 1

image:
  tag: "1.0.0"

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

service:
  type: LoadBalancer

livenessProbe:
  initialDelaySeconds: 30
  periodSeconds: 5

readinessProbe:
  initialDelaySeconds: 10
  periodSeconds: 3

rollout:
  strategy: blueGreen

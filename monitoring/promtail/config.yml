# Promtail Configuration
# Collects logs from Docker containers and sends to Loki

server:
  http_listen_port: 9080
  grpc_listen_port: 0

# Positions file tracks what logs were read
positions:
  filename: /tmp/positions.yaml

# Client configuration - where to send logs
clients:
  - url: http://loki:3100/loki/api/v1/push

# Scrape configurations - how to collect logs
scrape_configs:
  # Docker service discovery
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    
    # Filter containers - only scrape containers with logging label
    relabel_configs:
      # Only scrape containers with logging=promtail label
      - source_labels: [__meta_docker_container_label_logging]
        regex: promtail
        action: keep
      
      # Extract container name as label
      - source_labels: [__meta_docker_container_name]
        regex: /(.+)
        target_label: container
        replacement: ${1}
      
      # Extract app label if present
      - source_labels: [__meta_docker_container_label_app]
        target_label: app
      
      # Add job label
      - target_label: job
        replacement: docker
      
      # Add hostname label
      - replacement: ${HOSTNAME}
        target_label: hostname

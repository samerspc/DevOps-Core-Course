# Loki 3.0 Configuration
# Using TSDB index for better performance

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

# Common configuration (shared settings)
common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory

# Schema configuration for TSDB (Loki 3.0+)
schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

# Storage configuration
storage_config:
  filesystem:
    directory: /loki/chunks

# Limits configuration
limits_config:
  # Retention: 7 days (168 hours)
  retention_period: 168h
  # Query limits
  max_query_length: 721h
  max_query_parallelism: 32
  # Ingestion limits
  ingestion_rate_mb: 16
  ingestion_burst_size_mb: 32
  # Per-stream limits
  max_streams_per_user: 10000
  max_line_size: 256KB

# Compactor configuration (required for retention)
compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  # Required in Loki 3.0+ when retention is enabled
  delete_request_store: filesystem

# Query frontend (optional, improves query performance)
frontend:
  max_outstanding_per_tenant: 2048

# Query scheduler (optional)
query_scheduler:
  max_outstanding_requests_per_tenant: 1024

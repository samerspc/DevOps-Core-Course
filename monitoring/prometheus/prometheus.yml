global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Prometheus 3.x config-based retention (Task 4).
storage:
  tsdb:
    retention:
      time: 15d
      size: 10GB

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'app'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['app-python:5000']

  - job_name: 'loki'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['loki:3100']

  - job_name: 'grafana'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['grafana:3000']


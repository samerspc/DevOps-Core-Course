---
# Docker installation block with error handling
- name: Install Docker
  block:
    - name: Install prerequisite packages for Docker
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present

    - name: Create /etc/apt/keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker APT repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_facts['distribution_release'] }} stable"
        state: present
        filename: docker

    - name: Install Docker packages
      apt:
        name: "{{ docker_packages }}"
        state: present
        update_cache: yes
      notify: restart docker

  rescue:
    - name: Wait before retrying GPG key addition
      pause:
        seconds: 10

    - name: Retry apt update
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Retry Docker GPG key addition
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

  always:
    - name: Ensure Docker service is enabled
      service:
        name: docker
        state: started
        enabled: yes

  become: true
  tags:
    - docker_install
    - docker

# Docker configuration block
- name: Configure Docker
  block:
    - name: Add user to docker group
      user:
        name: "{{ docker_user }}"
        groups: docker
        append: yes

    - name: Install python3-docker for Ansible Docker modules
      apt:
        name: python3-docker
        state: present

  tags:
    - docker_config
    - docker

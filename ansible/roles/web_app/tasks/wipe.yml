---
# Wipe logic - Clean removal of deployed application
# Controlled by variable: web_app_wipe: true
# Gated by tag: web_app_wipe
# Default behavior: wipe tasks do NOT run

- name: Wipe web application
  block:
    - name: Stop and remove containers (Docker Compose down)
      community.docker.docker_compose_v2:
        project_src: "{{ compose_project_dir }}"
        state: absent
      ignore_errors: yes
      register: compose_down_result

    - name: Remove docker-compose.yml file
      file:
        path: "{{ compose_project_dir }}/docker-compose.yml"
        state: absent
      ignore_errors: yes

    - name: Remove application directory
      file:
        path: "{{ compose_project_dir }}"
        state: absent
      ignore_errors: yes

    - name: Optionally remove Docker images (commented out to save disk space)
      debug:
        msg: "Skipping image removal to save disk space. Uncomment to enable."
      # Uncomment below to remove images:
      # community.docker.docker_image:
      #   name: "{{ docker_image }}:{{ docker_tag }}"
      #   state: absent
      # ignore_errors: yes

    - name: Log wipe completion
      debug:
        msg: "Application {{ app_name }} wiped successfully from {{ compose_project_dir }}"

  when: web_app_wipe | bool
  tags:
    - web_app_wipe

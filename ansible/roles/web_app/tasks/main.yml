---
# Wipe logic runs first (when explicitly requested)
- name: Include wipe tasks
  include_tasks: wipe.yml
  tags:
    - web_app_wipe

# Deploy application with Docker Compose
- name: Deploy application with Docker Compose
  block:
    - name: Login to Docker Hub
      community.docker.docker_login:
        username: "{{ dockerhub_username }}"
        password: "{{ dockerhub_password }}"
      no_log: true
      tags:
        - app_deploy
        - compose

    - name: Create application directory
      file:
        path: "{{ compose_project_dir }}"
        state: directory
        mode: '0755'
      tags:
        - app_deploy
        - compose

    - name: Template docker-compose file
      template:
        src: docker-compose.yml.j2
        dest: "{{ compose_project_dir }}/docker-compose.yml"
        mode: '0644'
      tags:
        - app_deploy
        - compose

    - name: Deploy with docker-compose
      community.docker.docker_compose_v2:
        project_src: "{{ compose_project_dir }}"
        state: present
        pull: always
        recreate: smart
      register: deploy_result
      tags:
        - app_deploy
        - compose

    - name: Wait for application port to be available
      wait_for:
        host: localhost
        port: "{{ app_port }}"
        delay: 5
        timeout: 60
      tags:
        - app_deploy
        - compose

    - name: Verify health endpoint
      uri:
        url: "http://localhost:{{ app_port }}/health"
        method: GET
        status_code: 200
      register: health_check
      tags:
        - app_deploy
        - compose

    - name: Show health check result
      debug:
        msg: "Health check passed: {{ health_check.status }}"
      tags:
        - app_deploy
        - compose

  rescue:
    - name: Handle deployment failure
      debug:
        msg: "Deployment failed. Check logs and docker-compose.yml configuration."
      tags:
        - app_deploy
        - compose

  tags:
    - app_deploy
    - compose
